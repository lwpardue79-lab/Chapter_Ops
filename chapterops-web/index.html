<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Alpha Omega Chapter Operations</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">AO</div>
          <div>
            <h1>AO Chapter Ops</h1>
            <p>Alpha Omega · Pi Kappa Alpha</p>
          </div>
        </div>
        <nav class="nav" aria-label="Primary navigation">
          <button class="nav-item active" data-view="dashboard">Dashboard</button>
          <button class="nav-item" data-view="members">Members</button>
          <button class="nav-item" data-view="leadership">Executive Team</button>
          <button class="nav-item" data-view="recruitment">Recruitment</button>
          <button class="nav-item" data-view="events">Attendance</button>
          <button class="nav-item" data-view="finance">Finance</button>
          <button class="nav-item" data-view="kpis">KPI Reports</button>
          <button class="nav-item" data-view="tasks">Tasks</button>
          <button class="nav-item" data-view="reports">Reports</button>
          <button class="nav-item" data-view="settings">Settings</button>
        </nav>
        <div class="sidebar-card">
          <p class="eyebrow">Alpha Omega Chapter</p>
          <p>Kansas State University · Pi Kappa Alpha</p>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="orgLabel">Alpha Omega Chapter · Pi Kappa Alpha</p>
            <h2 id="viewTitle">Dashboard</h2>
          </div>
          <div class="topbar-actions">
            <span class="cloud-status" id="cloudStatus">Sign in required</span>
            <button class="ghost" id="undoBtn" title="Undo last change">Undo</button>
            <button class="ghost" id="signInBtn">Sign in</button>
            <button class="ghost hidden" id="syncBtn">Sync cloud</button>
            <button class="ghost hidden" id="signOutBtn">Sign out</button>
            <button class="ghost" id="importBtn">Import CSV/JSON</button>
            <button class="ghost" id="exportBtn">Backup</button>
            <button class="danger" id="resetBtn">Clear local data</button>
            <input hidden id="importFile" type="file" accept=".json,.csv,text/csv,application/json" />
          </div>
        </header>

        <div id="appRoot"></div>
      </main>
    </div>

    <div class="modal-backdrop hidden" id="modalBackdrop" role="dialog" aria-modal="true">
      <section class="modal" id="modal"></section>
    </div>
    <div class="toast hidden" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
