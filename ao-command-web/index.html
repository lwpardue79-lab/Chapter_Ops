<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AO Command | Alpha Omega Chapter</title>
    <meta name="description" content="A private chapter management platform for the Alpha Omega Chapter of Pi Kappa Alpha." />
    <meta property="og:title" content="AO Command | Alpha Omega Chapter" />
    <meta property="og:description" content="A private chapter management platform for the Alpha Omega Chapter of Pi Kappa Alpha." />
    <meta name="theme-color" content="#132d46" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">AO</div>
          <div>
            <h1>AO Command</h1>
            <p>Alpha Omega Chapter Management Platform</p>
          </div>
        </div>
        <nav class="nav" aria-label="Primary navigation"></nav>
        <div class="sidebar-card">
          <p class="eyebrow">AO Command v1.0</p>
          <p>One secure workspace for chapter leadership.</p>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="orgLabel">Alpha Omega Chapter · Pi Kappa Alpha</p>
            <h2 id="viewTitle">AO Command</h2>
          </div>
          <div class="topbar-actions">
            <span class="cloud-status" id="cloudStatus">Sign in required</span>
            <button class="ghost" id="undoBtn" title="Undo last change">Undo</button>
            <button class="ghost" id="signInBtn">Sign in</button>
            <button class="ghost hidden" id="syncBtn">Sync cloud</button>
            <button class="ghost hidden" id="signOutBtn">Sign out</button>
            <button class="ghost" id="importBtn">Import CSV/JSON</button>
            <button class="ghost" id="exportBtn">Backup</button>
            <button class="danger" id="resetBtn">Clear local data</button>
            <input hidden id="importFile" type="file" accept=".json,.csv,text/csv,application/json" />
          </div>
        </header>

        <div id="appRoot"></div>
        <footer class="app-footer" aria-label="Application footer">
          <strong>AO Command</strong>
          <span>Alpha Omega Chapter · Pi Kappa Alpha</span>
          <span>Private chapter management platform</span>
          <span>© 2026 Alpha Omega Chapter</span>
        </footer>
      </main>
    </div>

    <div class="modal-backdrop hidden" id="modalBackdrop" role="dialog" aria-modal="true">
      <section class="modal" id="modal"></section>
    </div>
    <div class="toast hidden" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
